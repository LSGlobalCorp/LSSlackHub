display_information:
  name: LS Agent Hub
  description: AI-powered agent response system
  background_color: "#1A73E8"

features:
  bot_user:
    display_name: LS Agent Hub
    always_online: true
  slash_commands:
    - command: /agent-respond
      description: Generate and post an AI response
      usage_hint: "[question or context]"
      should_escape: false
    - command: /tally
      description: Show agent response tally and stats
      usage_hint: "[today|week|month]"
      should_escape: false
    - command: /sync-data
      description: Sync workspace channels and user data
      should_escape: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - channels:read
      - channels:history
      - groups:read
      - groups:history
      - users:read
      - users:read.email
      - commands
      - im:read
      - im:write
      - team:read
      - reactions:read
      - reactions:write

settings:
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
